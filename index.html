<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GIF Gallery</title>

<style>
:root {
  --bg: #0b0a10;
  --card: #181424;
  --card-hover: #201a33;
  --card-active: #161027;
  --border: #2f2752;
  --text: #ece9ff;
  --muted: #b7b1e6;
  --accent: #9b8cff;
  --accent-soft: rgba(155,140,255,0.35);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 28px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background:
    radial-gradient(1200px 600px at 10% -10%, rgba(155,140,255,0.08), transparent),
    radial-gradient(900px 500px at 90% 10%, rgba(140,120,255,0.06), transparent),
    var(--bg);
  color: var(--text);
}

header {
  max-width: 1200px;
  margin: 0 auto 34px;
}

h1 {
  font-size: 2.2rem;
  margin: 0 0 8px;
}

p {
  margin: 0;
  color: var(--muted);
  font-size: 0.95rem;
}

.gallery {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}

.card {
  background: linear-gradient(180deg, var(--card), #140f22);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  transition:
    background 0.18s ease,
    transform 0.18s ease,
    box-shadow 0.18s ease;
}

.card:hover {
  background: linear-gradient(180deg, var(--card-hover), #18122c);
  box-shadow: 0 10px 30px rgba(120,90,255,0.15);
  transform: translateY(-2px);
}

.card:active {
  background: linear-gradient(180deg, var(--card-active), #120c22);
  transform: scale(0.97);
  box-shadow: 0 4px 14px rgba(120,90,255,0.25);
}

.preview {
  width: 100%;
  border-radius: 12px;
  overflow: hidden;
  background: #000;
}

.preview img {
  width: 100%;
  height: auto;
  display: block;
}

.actions {
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  padding: 9px 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  cursor: pointer;
  background: linear-gradient(180deg, #2a244d, #211b3f);
  color: var(--text);
  font-size: 0.9rem;
  transition:
    background 0.15s ease,
    box-shadow 0.15s ease,
    transform 0.1s ease;
}

button:hover {
  background: linear-gradient(180deg, #3a3270, #2a2358);
  box-shadow: 0 0 0 1px var(--accent-soft), 0 0 18px rgba(155,140,255,0.35);
}

button:active {
  background: linear-gradient(180deg, #241d4a, #1b153b);
  transform: scale(0.96);
  box-shadow: 0 0 10px rgba(155,140,255,0.55);
}

button.copied {
  background: linear-gradient(180deg, #9b8cff, #7b6cff);
  color: #fff;
  box-shadow: 0 0 22px rgba(155,140,255,0.6);
}

button.copied:hover {
  background: linear-gradient(180deg, #9b8cff, #7b6cff);
}
</style>
</head>

<body>

<header>
  <h1>My GIF Gallery</h1>
  <p>One click. Instant Discord-ready links.</p>
</header>

<main class="gallery" id="gallery"></main>

<script>
fetch('gifs.json')
  .then(res => res.json())
  .then(files => {
    const gallery = document.getElementById('gallery');

    files.forEach(file => {
      const relativePath = `gifs/${file}`;
      const fullUrl = new URL(relativePath, document.baseURI).href;

      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <div class="preview">
          <img src="${relativePath}" alt="${file}">
        </div>
        <div class="actions">
          <button>Copy link</button>
        </div>
      `;

      const btn = card.querySelector('button');
      btn.addEventListener('click', () => {
        navigator.clipboard.writeText(fullUrl);

        btn.textContent = 'Copied!';
        btn.classList.add('copied');

        setTimeout(() => {
          btn.textContent = 'Copy link';
          btn.classList.remove('copied');
        }, 900);
      });

      gallery.appendChild(card);
    });
  });
</script>

</body>
</html>
