<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GIF Gallery</title>

<style>
:root {
  --bg: #0b0a10;
  --card: #181424;
  --card-hover: #201a33;
  --card-active: #161027;
  --border: #2f2752;
  --text: #ece9ff;
  --muted: #b7b1e6;
  --accent: #9b8cff;
  --accent-soft: rgba(155,140,255,0.35);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 28px;
  font-family: system-ui, sans-serif;
  background:
    radial-gradient(1200px 600px at 10% -10%, rgba(155,140,255,0.08), transparent),
    radial-gradient(900px 500px at 90% 10%, rgba(140,120,255,0.06), transparent),
    var(--bg);
  color: var(--text);
}

header {
  max-width: 1200px;
  margin: 0 auto 34px;
}

h1 {
  font-size: 2.2rem;
  margin: 0 0 8px;
}

p {
  margin: 0;
  color: var(--muted);
}

.gallery {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}

.card {
  background: linear-gradient(180deg, var(--card), #140f22);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(120,90,255,0.2);
}

.card:active {
  transform: scale(0.97);
}

.preview {
  border-radius: 12px;
  overflow: hidden;
  background: #000;
}

.preview img,
.preview video {
  width: 100%;
  display: block;
  border-radius: 12px;
}

button {
  padding: 9px;
  border-radius: 10px;
  border: 1px solid var(--border);
  cursor: pointer;
  background: linear-gradient(180deg, #2a244d, #211b3f);
  color: var(--text);
  transition: all 0.15s ease;
}

button:hover {
  box-shadow: 0 0 18px rgba(155,140,255,0.4);
}

button.copied {
  background: linear-gradient(180deg, #9b8cff, #7b6cff);
  color: #fff;
}
</style>
</head>

<body>

<header>
  <h1>My GIF Gallery</h1>
  <p>GIFs & MP4s · One click · Discord-ready</p>
</header>

<main class="gallery" id="gallery"></main>

<script>
fetch('gifs.json')
  .then(r => r.json())
  .then(files => {
    const gallery = document.getElementById('gallery');

    const repo = location.pathname.split('/')[1];
    const base = `${location.origin}/${repo}`;

    files.forEach(file => {
      const relative = `gifs/${file}`;
      const fullUrl = `${base}/${relative}`;
      const ext = file.split('.').pop().toLowerCase();

      const card = document.createElement('div');
      card.className = 'card';

      let media;
      if (ext === 'mp4') {
        media = `
          <video
            src="${relative}"
            autoplay
            loop
            muted
            playsinline
          ></video>
        `;
      } else {
        media = `<img src="${relative}" alt="${file}">`;
      }

      card.innerHTML = `
        <div class="preview">${media}</div>
        <button>Copy link</button>
      `;

      const btn = card.querySelector('button');
      btn.onclick = () => {
        navigator.clipboard.writeText(fullUrl);
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy link';
          btn.classList.remove('copied');
        }, 900);
      };

      gallery.appendChild(card);
    });
  });
</script>

</body>
</html>
