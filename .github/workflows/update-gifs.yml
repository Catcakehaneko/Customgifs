name: Update media list

on:
  push:
    paths:
      - 'gifs/**'
  workflow_dispatch:

jobs:
  update-media:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate gifs.json
        run: |
          cd gifs
          # Include images + videos: GIFs, PNG, JPG, JPEG, WEBP, MP4, WEBM
          ls *.gif *.png *.jpg *.jpeg *.webp *.mp4 *.webm 2>/dev/null | sort > ../gifs.txt || true
          # Convert list to JSON array
          jq -R -s -c 'split("\n")[:-1]' ../gifs.txt > ../gifs.json
