name: Update GIF list

on:
  push:
    paths:
      - '**'
  workflow_dispatch:

permissions:
  contents: write   # allow pushing changes

jobs:
  update-gifs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          persist-credentials: true  # allows pushing with GITHUB_TOKEN

      - name: Rebuild gifs.json
        run: |
          rm -f gifs.json

          if [ ! -d gifs ]; then
            echo "[]" > gifs.json
          else
            find gifs -type f -printf "%f\n" | sort > gifs.txt
            jq -R -s -c 'split("\n")[:-1]' gifs.txt > gifs.json
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add gifs.json
          git diff --cached --quiet || git commit -m "Update gifs.json"
          git push
