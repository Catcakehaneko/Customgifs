name: Convert media to GIFs & update gallery

on:
  push:
    paths:
      - '**'
  workflow_dispatch:

permissions:
  contents: write  # allow pushing changes

jobs:
  update-gifs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Install FFmpeg
        run: sudo apt update && sudo apt install -y ffmpeg

      - name: Prepare conversion folders
        run: |
          if [ ! -d gifs ]; then
            echo "gifs folder not found, skipping conversion."
            mkdir gifs
          fi
          mkdir -p gifs_converted

      - name: Convert media to GIFs safely
        run: |
          set -e  # stop workflow if any command fails
          for f in gifs/*; do
            [ -f "$f" ] || continue  # skip if not a file
            filename=$(basename "$f")
            name="${filename%.*}"
            ext="${filename##*.}"
            
            # Limit video length to 5 seconds, resize to 320px width, fps 15
            if [[ "$ext" =~ ^(mp4|webm)$ ]]; then
              ffmpeg -y -t 5 -i "$f" -vf "fps=15,scale=320:-1:flags=lanczos" "gifs_converted/${name}.gif"
