name: Update GIF list

on:
  push:
    paths:
      - '**'          # Trigger on any change in repo
  workflow_dispatch:   # Allow manual trigger too

jobs:
  update-gifs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate gifs.json
        run: |
          # Only list files inside gifs/ folder
          cd gifs || exit 0
          # List all files in gifs/, including subfolders
          find . -type f -printf "%P\n" | sort > ../gifs.txt
          # Convert to JSON array
          jq -R -s -c 'split("\n")[:-1]' ../gifs.txt > ../gifs.json
