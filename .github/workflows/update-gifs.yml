name: Update GIF list

on:
  push:
    paths:
      - '**'          # triggers on any change in the repo
  workflow_dispatch:   # manual trigger allowed

jobs:
  update-gifs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Rebuild gifs.json
        run: |
          # Delete existing gifs.json if it exists
          if [ -f gifs.json ]; then
            rm gifs.json
          fi

          # Exit safely if gifs folder doesn't exist
          if [ ! -d gifs ]; then
            echo "[]" > gifs.json
            exit 0
          fi

          # List all files in gifs folder
          find gifs -type f -printf "%f\n" | sort > gifs.txt

          # Convert to JSON array and create new gifs.json
          jq -R -s -c 'split("\n")[:-1]' gifs.txt > gifs.json
